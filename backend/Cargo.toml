[package]
name = "dastill"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# HTTP client for YouTube/Ollama
reqwest = { version = "0.12", features = ["json"] }

# RSS parsing
rss = "2"
roxmltree = "0.20"

# HTML parsing for channel resolution
scraper = "0.22"

# Async utilities
thiserror = "2"
anyhow = "1"
rig-core = "0.28.0"
sha2 = "0.10"

# Date/time
chrono = { version = "0.4", features = ["serde"] }
libsql = "0.9.29"

[dev-dependencies]
tempfile = "3"
