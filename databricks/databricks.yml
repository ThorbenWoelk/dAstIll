bundle:
  name: dastill-analytics

variables:
  catalog:
    description: Unity Catalog catalog name.
    default: workspace

  schema:
    description: Schema where the pipeline writes Silver/Gold tables.
    default: analytics

  bronze_schema:
    description: >-
      Schema where the backend writes Bronze (must match DATABRICKS_SCHEMA).
      Backend default is sandbox (see backend/src/config.rs).
    default: sandbox

  warehouse_id:
    description: >-
      SQL warehouse ID for dashboard queries.
      Find it in Databricks: SQL Warehouses > your warehouse > Connection Details > HTTP Path.

# Workspace host is read from DATABRICKS_HOST env var or ~/.databrickscfg.
workspace:
  root_path: /Shared/.bundle/${bundle.name}/${bundle.target}

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/dev
    variables:
      schema: analytics_dev
      # Bronze stays where the backend writes (typically sandbox); Silver/Gold use analytics_dev.

  prod:
    mode: production
    variables:
      # Match GitHub Actions / Cloud Run DATABRICKS_SCHEMA when not sandbox.
      bronze_schema: analytics

resources:
  jobs:
    analytics_transformations_refresh:
      name: "[dAstIll] Analytics Transformations Refresh"
      tasks:
        - task_key: run_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.analytics_transformations.id}
            full_refresh: false

  pipelines:
    analytics_transformations:
      name: "[dAstIll] Analytics Transformations"
      catalog: ${var.catalog}
      target: ${var.schema}
      serverless: true
      channel: CURRENT
      continuous: false
      # bronze_table: Unity Catalog three-level name for Bronze events (read by 00_app_events_silver.sql).
      # Format: catalog.schema.bronze_app_events
      configuration:
        bronze_table: ${var.catalog}.${var.bronze_schema}.bronze_app_events
      libraries:
        - file:
            path: ./pipelines/00_app_events_silver.sql
        - file:
            path: ./pipelines/01_processing_gold.sql
        - file:
            path: ./pipelines/02_engagement_gold.sql
        - file:
            path: ./pipelines/03_consumption_gold.sql

  dashboards:
    processing_efficiency:
      display_name: "[dAstIll] Processing Efficiency"
      file_path: ./dashboards/processing_efficiency.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: false

    acknowledgment_highlights:
      display_name: "[dAstIll] Acknowledgment and Highlights"
      file_path: ./dashboards/acknowledgment_highlights.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: false

    summary_consumption:
      display_name: "[dAstIll] Summary Consumption"
      file_path: ./dashboards/summary_consumption.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: false

sync:
  paths:
    - pipelines
    - dashboards
