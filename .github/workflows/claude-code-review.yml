name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'
    
    runs-on: ubuntu-latest
    
    # Prevent duplicate runs for the same PR
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Optional: Specify model (defaults to Claude Sonnet 4, uncomment for Claude Opus 4)
          # model: "claude-opus-4-20250514"
          
          direct_prompt: |
            Review this PR critically. Focus on problems that matter:
            
            **Context: This project currently prioritizes rapid development over backwards compatibility.**
            Breaking changes are acceptable for now since the project is in active development phase.
            
            **Does this change make sense?**
            - Is it solving the right problem in the right way?
            - Does it fit the application's philosophy from CLAUDE.md and README.md?
            - Is the approach unnecessarily complex or clever?
            - Does it break existing patterns without good reason?
            
            **What could go wrong?**
            - Security vulnerabilities or unsafe input handling
            - Potential system failures or data corruption
            - Performance problems under load
            - Missing type hints on public interfaces
            - Improper exception handling patterns
            - Race conditions or resource leaks
            - Untested critical code paths
            
            **Is the code maintainable?**
            - Clear intent and readable logic flow
            - Appropriate abstractions and separation of concerns
            - Adequate test coverage for critical functionality 
            - Will future developers understand this?
            - Tests hitting external APIs (should be mocked)
            
            Skip positive feedback and style nitpicks.
            Be concise and focus on real problems.

          # Optional: Use sticky comments to make Claude reuse the same comment on subsequent pushes to the same PR
          # use_sticky_comment: true
          
          # Optional: Different prompts for different authors
          # direct_prompt: |
          #   ${{ github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' && 
          #   'Welcome! Please review this PR from a first-time contributor. Be encouraging and provide detailed explanations for any suggestions.' ||
          #   'Please provide a thorough code review focusing on our coding standards and best practices.' }}
          
          # Optional: Add specific tools for running tests or linting
          # allowed_tools: "Bash(npm run test),Bash(npm run lint),Bash(npm run typecheck)"
          
          # Optional: Skip review for certain conditions
          # if: |
          #   !contains(github.event.pull_request.title, '[skip-review]') &&
          #   !contains(github.event.pull_request.title, '[WIP]')

