name: Release

run-name: >-
  ${{
    github.event_name == 'workflow_dispatch'
      && format('Release ({0})', github.event.inputs.target || 'all')
      || 'Release'
  }}

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      target:
        description: Deploy scope
        type: choice
        options:
          - all
          - backend
          - docs
          - frontend
        default: all

concurrency:
  group: release-${{ github.sha }}-${{ github.event.inputs.target || 'all' }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west3
  REPO_ID: dastill
  BACKEND_SERVICE: dastill-backend
  FRONTEND_SERVICE: dastill-frontend
  DOCS_SERVICE: dastill-docs

permissions:
  contents: read
  id-token: write

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml

  security:
    name: Security
    uses: ./.github/workflows/security.yml

  deploy-backend:
    name: Deploy Backend
    needs:
      - checks
      - security
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'backend'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build and Push Backend Image
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_ID/backend:$IMAGE_TAG ./backend
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_ID/backend:$IMAGE_TAG

      # Mount DATABRICKS_TOKEN only when Databricks is configured. Otherwise Cloud Run
      # still resolves :latest and fails if the secret has no enabled versions.
      - name: Prepare backend Cloud Run secrets
        id: backend_secrets
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
        run: |
          set -euo pipefail
          trimmed="$(printf '%s' "$DATABRICKS_HOST" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          {
            echo 'YOUTUBE_API_KEY=dastill-youtube-api-key:latest'
            echo 'OLLAMA_API_KEY=dastill-ollama-api-key:latest'
            echo 'LOGFIRE_TOKEN=dastill-logfire-token:latest'
            echo 'BACKEND_PROXY_TOKEN=dastill-backend-proxy-token:latest'
            if [ -n "$trimmed" ]; then
              echo 'DATABRICKS_TOKEN=dastill-databricks-token:latest'
            fi
          } > /tmp/backend_cr_secrets.txt
          {
            echo 'secrets<<CR_SECRETS_EOF'
            cat /tmp/backend_cr_secrets.txt
            echo 'CR_SECRETS_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Deploy Backend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_ID }}/backend:${{ env.IMAGE_TAG }}
          flags: "--service-account=dastill-backend-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          # Quote so newlines from the prior step are preserved for deploy-cloudrun.
          secrets: "${{ steps.backend_secrets.outputs.secrets }}"
          secrets_update_strategy: overwrite
          env_vars: |
            AWS_REGION=${{ vars.AWS_REGION }}
            AWS_ROLE_ARN=${{ vars.AWS_ROLE_ARN }}
            AWS_WIF_AUDIENCE=${{ vars.AWS_WIF_AUDIENCE }}
            S3_DATA_BUCKET=${{ vars.S3_DATA_BUCKET }}
            S3_VECTOR_BUCKET=${{ vars.S3_VECTOR_BUCKET }}
            S3_VECTOR_INDEX=${{ vars.S3_VECTOR_INDEX }}
            # Release builds default semantic search off; default to on when unset (embedding + vector buckets are configured above).
            SEARCH_SEMANTIC_ENABLED=${{ vars.SEARCH_SEMANTIC_ENABLED || 'true' }}
            OLLAMA_URL=${{ vars.OLLAMA_URL }}
            OLLAMA_MODEL=${{ vars.OLLAMA_MODEL }}
            OLLAMA_EMBEDDING_MODEL=${{ vars.OLLAMA_EMBEDDING_MODEL }}
            SUMMARY_EVALUATOR_MODEL=${{ vars.SUMMARY_EVALUATOR_MODEL }}
            SUMMARIZE_PATH=/usr/local/bin/summarize
            BACKEND_CORS_ALLOWED_ORIGINS=${{ vars.BACKEND_CORS_ALLOWED_ORIGINS }}
            POLLY_TTS_ENABLED=true
            POLLY_TTS_VOICE_ID=Stephen
            DATABRICKS_HOST=${{ vars.DATABRICKS_HOST }}
            DATABRICKS_WAREHOUSE_ID=${{ vars.DATABRICKS_WAREHOUSE_ID }}
            DATABRICKS_CATALOG=${{ vars.DATABRICKS_CATALOG }}
            DATABRICKS_SCHEMA=${{ vars.DATABRICKS_SCHEMA }}
            DATABRICKS_BRONZE_TABLE=${{ vars.DATABRICKS_BRONZE_TABLE }}
            GCP_PROJECT_ID=${{ env.PROJECT_ID }}
            RUST_LOG=dastill=info,tower_http=info

  deploy-docs:
    name: Deploy Docs
    needs:
      - checks
      - security
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'docs'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build and Push Docs Image
        run: |
          docker build \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_ID/docs:$IMAGE_TAG ./docs
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_ID/docs:$IMAGE_TAG

      - name: Deploy Docs to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.DOCS_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_ID }}/docs:${{ env.IMAGE_TAG }}
          flags: "--allow-unauthenticated --service-account=dastill-docs-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"

  resolve-frontend-env:
    name: Resolve Frontend Environment
    needs:
      - deploy-backend
      - deploy-docs
    if: always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'frontend') && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') && (needs.deploy-docs.result == 'success' || needs.deploy-docs.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      backend_url: ${{ steps.urls.outputs.backend_url }}
      docs_url: ${{ steps.urls.outputs.docs_url }}

    steps:
      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Resolve deployed service URLs
        id: urls
        env:
          DEPLOYED_BACKEND_URL: ${{ needs.deploy-backend.outputs.url }}
          DEPLOYED_DOCS_URL: ${{ needs.deploy-docs.outputs.url }}
        run: |
          backend_url="$DEPLOYED_BACKEND_URL"
          docs_url="$DEPLOYED_DOCS_URL"

          if [ -z "$backend_url" ]; then
            backend_url="$(gcloud run services describe "$BACKEND_SERVICE" --region "$REGION" --format='value(status.url)')"
          fi

          if [ -z "$docs_url" ]; then
            docs_url="$(gcloud run services describe "$DOCS_SERVICE" --region "$REGION" --format='value(status.url)')"
          fi

          echo "backend_url=$backend_url" >> "$GITHUB_OUTPUT"
          echo "docs_url=$docs_url" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend
    needs:
      - checks
      - security
      - resolve-frontend-env
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'frontend'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build and Push Frontend Image
        run: |
          docker build \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_ID/frontend:$IMAGE_TAG ./frontend
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_ID/frontend:$IMAGE_TAG

      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_ID }}/frontend:${{ env.IMAGE_TAG }}
          flags: "--service-account=dastill-frontend-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          secrets: |
            BACKEND_PROXY_TOKEN=dastill-backend-proxy-token:latest
          # Overwrite drops legacy secret mounts (e.g. app-auth / app-session) that no longer have IAM.
          secrets_update_strategy: overwrite
          env_vars: |
            BACKEND_API_BASE=${{ needs.resolve-frontend-env.outputs.backend_url }}
            BACKEND_IDENTITY_AUDIENCE=${{ needs.resolve-frontend-env.outputs.backend_url }}
            PUBLIC_DOCS_URL=${{ needs.resolve-frontend-env.outputs.docs_url }}
            PUBLIC_CONTACT_EMAIL=${{ vars.CONTACT_EMAIL }}
            ADDRESS_HEADER=X-Forwarded-For
