name: Checks

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Check
        working-directory: backend
        run: cargo check

      - name: Cargo Test
        working-directory: backend
        run: cargo test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Frontend Check
        working-directory: frontend
        run: bun run check

      - name: Frontend Test
        working-directory: frontend
        run: bun test

  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Docs Dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Docs Build
        working-directory: docs
        run: bun run build
