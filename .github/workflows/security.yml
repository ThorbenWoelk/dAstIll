name: Security

on:
  workflow_call:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  backend-audit:
    name: Backend Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo Audit
        working-directory: backend
        run: cargo audit

  frontend-audit:
    name: Frontend Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Frontend Production Audit
        working-directory: frontend
        run: bun audit --production

  docs-audit:
    name: Docs Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Docs Dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Docs Production Audit
        working-directory: docs
        run: bun audit --production
