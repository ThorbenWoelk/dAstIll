services:
  dastill-monitor:
    build: .
    container_name: dastill-monitor
    volumes:
      # Mount local data directory for transcripts - using consistent /data path
      - ./data:/data
      # Mount configuration directory to /data/config for consistency
      - ./config:/data/config
      # Mount Claude Code authentication from host (needs write for updates)
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
      - ~/.ssh:/root/.ssh:ro
    environment:
      # Use consistent /data path for both storage and config
      - DASTILL_BASE_PATH=/data
      # Configuration directory aligned with base path
      - DASTILL_CONFIG_DIR=/data/config
      # Optional: Override check interval (default is from config)
      # - DASTILL_CHECK_INTERVAL=300
    restart: unless-stopped
    # Health check to ensure service is running
    healthcheck:
      test: ["CMD", "pgrep", "python"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Add a second service for one-time operations
  dastill-cli:
    build: .
    container_name: dastill-cli
    volumes:
      - ./data:/data
      # Mount Claude Code authentication from host (needs write for updates)
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
      - ~/.ssh:/root/.ssh:ro
    environment:
      - DASTILL_BASE_PATH=/data
      - DASTILL_CONFIG_DIR=/data/config
    # Override entrypoint for CLI usage
    entrypoint: ["uv", "run", "python", "main.py"]
    # This service doesn't run by default
    profiles: ["cli"]