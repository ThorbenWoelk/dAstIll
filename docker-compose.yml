services:
  dastill-monitor:
    build: .
    container_name: dastill-monitor
    volumes:
      # Mount the configured transcript storage directory from .env file
      - ${DASTILL_BASE_PATH}:/transcripts
      # Mount configuration directory
      - ./config:/app/config
      # Mount Claude Code authentication from host (needs write for updates)
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
      - ~/.ssh:/root/.ssh:ro
    environment:
      # Use the centralized storage path from .env file
      - DASTILL_BASE_PATH=/transcripts
      # Configuration directory (use default app config location)
      - DASTILL_CONFIG_DIR=/app/config
      # Optional: Override check interval (default is from config)
      # - DASTILL_CHECK_INTERVAL=300
    env_file:
      - .env
    restart: unless-stopped
    # Health check to ensure service is running
    healthcheck:
      test: ["CMD", "pgrep", "python"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Add a second service for one-time operations
  dastill-cli:
    build: .
    container_name: dastill-cli
    volumes:
      # Mount the configured transcript storage directory from .env file
      - ${DASTILL_BASE_PATH}:/data
      # Mount Claude Code authentication from host (needs write for updates)
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
      - ~/.ssh:/root/.ssh:ro
    environment:
      - DASTILL_BASE_PATH=/data
      - DASTILL_CONFIG_DIR=/data/config
    env_file:
      - .env
    # Override entrypoint for CLI usage
    entrypoint: ["uv", "run", "python", "main.py"]
    # This service doesn't run by default
    profiles: ["cli"]
