<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dAstIll</title>
    <meta name="theme-color" content="#f8f1ec" />
    <meta name="application-name" content="dAstIll" />
    <meta name="apple-mobile-web-app-title" content="dAstIll" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%sveltekit.assets%/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="%sveltekit.assets%/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%sveltekit.assets%/apple-touch-icon.png"
    />

    <script>
      (() => {
        const storageKey = "dastill-theme-appearance";
        const colorKey = "dastill-theme-color";
        const lightThemeColor = "#f8f1ec";
        const darkThemeColor = "#111315";
        const storedMode = localStorage.getItem(storageKey);
        const isSystem = storedMode !== "light" && storedMode !== "dark";
        const systemPrefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        const isDark = isSystem ? systemPrefersDark : storedMode === "dark";

        document.documentElement.classList.toggle("dark", isDark);
        document.documentElement.style.colorScheme = isDark ? "dark" : "light";
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", isDark ? darkThemeColor : lightThemeColor);

        const validColors = ["ember", "sage", "ocean", "sand", "plum"];
        const color = localStorage.getItem(colorKey);
        document.documentElement.setAttribute(
          "data-color",
          validColors.includes(color) ? color : "ember",
        );
      })();
    </script>
    %sveltekit.head%
  </head>

  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
