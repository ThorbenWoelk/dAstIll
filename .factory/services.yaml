commands:
  install_frontend: cd frontend && bun install
  install_backend: cd backend && cargo check
  test: cd frontend && bun test tests && cd ../backend && cargo test
  test_frontend: cd frontend && bun test tests
  test_backend: cd backend && cargo test
  typecheck: cd frontend && bunx svelte-check --tsconfig ./tsconfig.json
  lint: cd frontend && bunx eslint .
  build_frontend: cd frontend && bun run build

services:
  backend:
    start: cd backend && PORT=3544 cargo run --bin dastill 2>&1 | tee ../backend.log &
    stop: lsof -ti :3544 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3544/api/health
    port: 3544
    depends_on: []

  frontend:
    start: cd frontend && BACKEND_API_BASE=http://localhost:3544 BACKEND_PROXY_TOKEN=local-dev-backend-proxy-token bun run dev -- --host 0.0.0.0 --port 3543 2>&1 | tee ../frontend.log &
    stop: lsof -ti :3543 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3543
    port: 3543
    depends_on: [backend]

  firebase_emulator:
    start: cd frontend && firebase emulators:start --only auth --project demo-dastill
    stop: lsof -ti :9099 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://127.0.0.1:9099
    port: 9099
    depends_on: []

  docs:
    start: cd docs && bun run dev 2>&1 | tee ../docs.log &
    stop: lsof -ti :4173 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:4173
    port: 4173
    depends_on: []
